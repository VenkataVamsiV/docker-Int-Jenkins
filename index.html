<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Docker + Jenkins Integration Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f5f5f5;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 22px;
      margin-bottom: 12px;
    }
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      background: #e6f4ea;
      color: #1e7e34;
      border: 1px solid #c6e9c9;
    }
    .meta {
      margin-top: 12px;
      font-size: 13px;
      color: #555;
    }
    code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✅ Docker + Jenkins Integration Test Page</h1>
    <p>This page is served from a Docker container triggered by a Jenkins pipeline.</p>

    <div class="status">
      <strong>Status:</strong> Docker container is running and serving HTML.
    </div>

    <div class="meta">
      <p><strong>Container hostname:</strong> <code id="hostname"></code></p>
      <p><strong>Container ID (if available):</strong> <code id="container-id"></code></p>
      <p><strong>Timestamp:</strong> <code id="timestamp"></code></p>
    </div>

    <script>
      // Basic client-side demo: show current time and hostname (if exposed)
      document.getElementById('timestamp').textContent = new Date().toISOString();

      // Optional: if you expose HOSTNAME/CONTAINER_ID via env and inject them into HTML at build time,
      // you can replace these with server-side templating (e.g., envsubst, mustache, etc.).
      const hostname = window.location.hostname || 'unknown';
      document.getElementById('hostname').textContent = hostname;

      // Example: if you inject CONTAINER_ID into the HTML during Docker build:
      // document.getElementById('container-id').textContent = '{{CONTAINER_ID}}';
    </script>
  </div>
</body>
</html>
